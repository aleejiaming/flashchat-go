<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Retro Terminal</title>
    <!-- 引入 Google 復古像素字體 -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
   
</head>
<body>
    <script type="module" src="/js/main.js"></script>

    <!-- 步驟 1：暱稱輸入彈窗 -->
    <div id="login-modal">
        <div class="modal-box">
            <p>INITIALIZING SYSTEM...</p>
            <p>ENTER NICKNAME <span class="blink-cursor">_</span></p>
            <input type="text" id="nickname-input" placeholder="Guest" autocomplete="off" autofocus>
            <button id="join-btn">CONNECT</button>
        </div>
    </div>

    <!-- 步驟 2：聊天室主畫面 -->
    <div id="app-container">
        <header>
            ⚡ FLASHCHAT_OS v1.0 ⚡
        </header>

        <div id="main-area">
            <!-- 彈幕飛行區 -->
            <div id="danmaku-zone"></div>
            
            <!-- 聊天歷史紀錄區 -->
            <div id="chat-sidebar">
                <div class="chat-msg"><span class="chat-time">[SYSTEM]</span> <span style="color:yellow;">Welcome to FlashChat. Type /help for commands.</span></div>
            </div>
        </div>

        <div id="input-area">
            <span style="font-size: 28px; line-height: 40px;" id="display-name">Guest></span>
            <input type="text" id="message-input" placeholder="Enter message or /command..." autocomplete="off">
            <button id="emoji-btn">😀</button> <!-- 新增：笑臉按鈕 -->
            <button id="send-btn">SEND</button>
            
            <!-- 新增：隱藏的表情符號選單 -->
            <div id="emoji-picker"></div>
        </div>
    </div>
</body>
</html>
