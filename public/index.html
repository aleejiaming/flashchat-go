<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Retro Terminal</title>
    <!-- 引入 Google 復古像素字體 -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           復古 CRT 螢幕基礎設定
           ========================================= */
        :root {
            --retro-green: #39ff14;
            --retro-dark: #051005;
            --retro-border: 2px solid #39ff14;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--retro-dark);
            color: var(--retro-green);
            font-family: 'VT323', monospace;
            font-size: 24px;
            overflow: hidden;
        }

        /* 掃描線特效 (Scanlines) */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* =========================================
           排版佈局 (Layout)
           ========================================= */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            filter: drop-shadow(0 0 5px var(--retro-green));
        }

        header {
            text-align: center;
            font-size: 36px;
            border-bottom: var(--retro-border);
            padding-bottom: 10px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #main-area {
            display: flex;
            flex: 1;
            gap: 10px;
            height: calc(100% - 120px);
        }

        #danmaku-zone {
            flex: 7;
            border: var(--retro-border);
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        #chat-sidebar {
            flex: 3;
            border: var(--retro-border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            background-color: rgba(57, 255, 20, 0.05);
            font-size: 24px;
        }

        .chat-msg {
            margin-bottom: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .chat-time { color: #888; font-size: 0.9em; }
        .chat-name { color: #fff; font-weight: bold; }

        /* =========================================
           輸入區 (Bottom)
           ========================================= */
        #input-area {
            display: flex;
            margin-top: 10px;
            height: 40px;
            gap: 10px;
            z-index: 10;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background-color: #000;
            color: var(--retro-green);
            border: var(--retro-border);
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 5px 10px;
            outline: none;
        }
        
        input[type="text"]:focus {
            background-color: #111;
        }

        button {
            background-color: var(--retro-green);
            color: #000;
            border: none;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 0 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background-color: #fff;
        }

        /* =========================================
           彈幕動畫 (Danmaku)
           ========================================= */
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 var(--retro-green);
            animation: fly-across 8s linear forwards; 
        }

        @keyframes fly-across {
            0% { left: 100%; transform: translateX(0); }
            100% { left: 0%; transform: translateX(-100%); }
        }

        /* =========================================
           登入彈窗 (Modal)
           ========================================= */
        #login-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            border: var(--retro-border);
            padding: 40px;
            text-align: center;
            background-color: #000;
            box-shadow: 0 0 20px var(--retro-green);
        }

        .modal-box p { font-size: 32px; }
        .blink-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <!-- 步驟 1：暱稱輸入彈窗 -->
    <div id="login-modal">
        <div class="modal-box">
            <p>INITIALIZING SYSTEM...</p>
            <p>ENTER NICKNAME <span class="blink-cursor">_</span></p>
            <input type="text" id="nickname-input" placeholder="Guest" autocomplete="off" autofocus>
            <button id="join-btn">CONNECT</button>
        </div>
    </div>

    <!-- 步驟 2：聊天室主畫面 -->
    <div id="app-container">
        <header>
            ⚡ FLASHCHAT_OS v1.0 ⚡
        </header>

        <div id="main-area">
            <!-- 彈幕飛行區 -->
            <div id="danmaku-zone"></div>
            
            <!-- 聊天歷史紀錄區 -->
            <div id="chat-sidebar">
                <div class="chat-msg"><span class="chat-time">[SYSTEM]</span> <span style="color:yellow;">Welcome to FlashChat. Type /help for commands.</span></div>
            </div>
        </div>

        <div id="input-area">
            <span style="font-size: 28px; line-height: 40px;" id="display-name">Guest></span>
            <input type="text" id="message-input" placeholder="Enter message or /command..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <!-- 核心前端邏輯 -->
    <script>
        // 將所有邏輯包裝在 window.onload 中，確保所有 HTML 元素都載入完成後才執行
        window.onload = function() {
            // 取得畫面上的元件
            const loginModal = document.getElementById('login-modal');
            const nicknameInput = document.getElementById('nickname-input');
            const joinBtn = document.getElementById('join-btn');
            const displayName = document.getElementById('display-name');
            
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const chatSidebar = document.getElementById('chat-sidebar');
            const danmakuZone = document.getElementById('danmaku-zone');

            let myNickname = "Guest";
            let socket;

            // ==========================================
            // 0. WebSocket 連線邏輯
            // ==========================================
            function connectWebSocket() {
                // 連線到後端的 /ws 路由
                socket = new WebSocket("ws://" + window.location.host + "/ws");

                // 當連線成功時
                socket.onopen = function() {
                    appendSidebarMessage("SYSTEM", "Connected to FlashChat server.");
                };

                // 當收到伺服器廣播時
                socket.onmessage = function(event) {
                    const msg = JSON.parse(event.data);
                    const now = new Date();
                    const timeStr = now.toTimeString().split(' ')[0];

                    appendSidebarMessage(timeStr, msg.name, msg.content);
                    fireDanmaku(msg.content);
                };

                // 當連線斷開時
                socket.onclose = function() {
                    appendSidebarMessage("SYSTEM", "Connection lost. Reconnecting in 3s...");
                    setTimeout(connectWebSocket, 3000); // 3 秒後自動重連
                };
            }

            // ==========================================
            // 1. 登入邏輯
            // ==========================================
            function joinChat() {
                const name = nicknameInput.value.trim();
                if (name !== "") {
                    myNickname = name;
                }
                displayName.innerText = myNickname + ">";
                loginModal.style.display = 'none'; // 隱藏登入視窗
                messageInput.focus(); // 讓游標跳到聊天輸入框
                
                // 登入後啟動連線
                connectWebSocket();
            }

            // 綁定事件監聽器
            joinBtn.addEventListener('click', joinChat);
            nicknameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') joinChat();
            });

            // ==========================================
            // 2. 發送訊息邏輯
            // ==========================================
            function sendMessage() {
                const text = messageInput.value.trim();
                if (text === "") return; // 空白不處理

                // 改變邏輯：不直接寫入畫面了！把資料包成 JSON 丟給伺服器！
                const msgObj = {
                    name: myNickname,
                    content: text
                };
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(msgObj));
                } else {
                    appendSidebarMessage("SYSTEM", "Not connected to server!");
                }

                // 清空輸入框
                messageInput.value = "";
            }

            // 綁定事件監聽器
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });

            // ==========================================
            // 3. 畫面更新工具函式
            // ==========================================
            
            // 寫入側邊欄
            function appendSidebarMessage(time, name, msg) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'chat-msg';
                
                let color = "var(--retro-green)";
                if (msg && msg.startsWith('/')) {
                    color = "#ff00ff";
                }

                msgDiv.innerHTML = `<span class="chat-time">[${time}]</span> <span class="chat-name">${name}:</span> <span style="color:${color}">${msg}</span>`;
                chatSidebar.appendChild(msgDiv);
                
                chatSidebar.scrollTop = chatSidebar.scrollHeight;
            }

            // 發射彈幕
            function fireDanmaku(msg) {
                const danmaku = document.createElement('div');
                danmaku.className = 'danmaku-item';
                danmaku.innerText = msg;

                const randomTop = Math.floor(Math.random() * 80) + 10;
                danmaku.style.top = `${randomTop}%`;

                const randomSpeed = Math.floor(Math.random() * 4) + 6;
                danmaku.style.animationDuration = `${randomSpeed}s`;

                danmakuZone.appendChild(danmaku);

                setTimeout(() => {
                    danmaku.remove();
                }, randomSpeed * 1000);
            }
        };
    </script>
</body>
</html>
