<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Retro Terminal</title>
    <!-- 引入 Google 復古像素字體 -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
   
</head>
<body>
    <script type="module" src="/js/main.js"></script>

    <!-- 步驟 1：暱稱輸入彈窗 -->
    <div id="login-modal">
        <div class="modal-box">
            <p>FLASHCHAT_OS LOGIN SYSTEM</p>
            
            <div id="auth-tabs" style="margin-bottom: 20px;">
                <button id="tab-login" style="background-color: #fff; color: #000;">LOGIN</button>
                <button id="tab-register">REGISTER</button>
                <button id="tab-guest">GUEST</button>
            </div>

            <p id="auth-error-msg" style="color: red; font-size: 20px; display: none;"></p>

            <div id="form-member">
                <p>USERNAME <span class="blink-cursor">_</span></p>
                <input type="text" id="username-input" placeholder="Account" autocomplete="off">
                <p>PASSWORD <span class="blink-cursor">_</span></p>
                <input type="password" id="password-input" placeholder="********">
                <button id="submit-member-btn" style="margin-top: 15px;">SUBMIT</button>
            </div>

            <div id="form-guest" style="display: none;">
                <p>ENTER NICKNAME <span class="blink-cursor">_</span></p>
                <input type="text" id="nickname-input" placeholder="Guest Name" autocomplete="off">
                <button id="submit-guest-btn" style="margin-top: 15px;">CONNECT AS GUEST</button>
            </div>
        </div>
    </div>

    <!-- 步驟 2：聊天室主畫面 -->
    <div id="app-container">
        <header>
            ⚡ FLASHCHAT_OS v1.0 ⚡
        </header>

        <div id="main-area">
            <!-- 彈幕飛行區 -->
            <div id="danmaku-zone"></div>
            
            <!-- 聊天歷史紀錄區 -->
            <div id="chat-sidebar">
                <div class="chat-msg"><span class="chat-time">[SYSTEM]</span> <span style="color:yellow;">Welcome to FlashChat. Type /help for commands.</span></div>
            </div>
        </div>

        <div id="input-area">
            <span style="font-size: 28px; line-height: 40px;" id="display-name">Guest></span>
            <input type="text" id="message-input" placeholder="Enter message or /command..." autocomplete="off">
            <button id="emoji-btn">😀</button> <!-- 新增：笑臉按鈕 -->
            <button id="send-btn">SEND</button>
            
            <!-- 新增：隱藏的表情符號選單 -->
            <div id="emoji-picker"></div>
        </div>
    </div>
</body>
</html>
